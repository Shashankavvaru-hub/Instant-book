name: InstantBook CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # JOB 1: Lint & Build Frontend
  frontend:
    name: Frontend — Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./frontend

      - name: Build Next.js app
        run: npm run build
        working-directory: ./frontend
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

  # JOB 2: Backend Install & Prisma Check
  backend:
    name: Backend — Install & Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./backend

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: ./backend

  # JOB 3: Build & Push to Docker Hub
  docker-push:
    name: Docker — Build & Push to Docker Hub
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Backend ──
      - name: Build & Push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/instantbook-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/instantbook-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Frontend ──
      - name: Build & Push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/instantbook-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/instantbook-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # JOB 4: Deploy to local Minikube via self-hosted runner
  deploy:
    name: Deploy — Minikube (self-hosted)
    runs-on: self-hosted
    needs: [docker-push]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    defaults:
      run:
        shell: cmd

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare kubeconfig
          run: |
            mkdir C:\kube 2>nul
            copy /Y C:\Users\shashank\.kube\config C:\kube\config

      - name: Verify kubectl
          run: kubectl cluster-info
          env:
            KUBECONFIG: C:\kube\config

      - name: Update backend image tag
        run: kubectl set image deployment/instantbook-backend backend=${{ secrets.DOCKERHUB_USERNAME }}/instantbook-backend:${{ github.sha }}

      - name: Update frontend image tag
        run: kubectl set image deployment/instantbook-frontend frontend=${{ secrets.DOCKERHUB_USERNAME }}/instantbook-frontend:${{ github.sha }}

      - name: Wait for backend rollout
        run: kubectl rollout status deployment/instantbook-backend --timeout=180s

      - name: Wait for frontend rollout
        run: kubectl rollout status deployment/instantbook-frontend --timeout=180s

      - name: Show running pods
        run: kubectl get pods -o wide
