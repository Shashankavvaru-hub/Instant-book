version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: instantbook-backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    restart: unless-stopped
    networks:
      - instantbook-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: instantbook-frontend
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env.local
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - instantbook-network

networks:
  instantbook-network:
    driver: bridge
