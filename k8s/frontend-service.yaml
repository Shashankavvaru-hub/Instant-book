apiVersion: v1
kind: Service
metadata:
  name: instantbook-frontend
  labels:
    app: instantbook-frontend
spec:
  selector:
    app: instantbook-frontend
  type: NodePort
  ports:
    - name: http
      protocol: TCP
      port: 3000        # ClusterIP port (internal)
      targetPort: 3000  # Container port
      nodePort: 30000   # External port via minikube ip
